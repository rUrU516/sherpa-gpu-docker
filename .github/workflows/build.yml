name: Build and Push Docker Image

# 触发条件：push 到 main 分支，或手动触发
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: crpi-fzs0fg8gltoy1io9.cn-hangzhou.personal.cr.aliyuncs.com
  NAMESPACE: fituer
  IMAGE_NAME: sherpa-gpu

jobs:
  build:
    runs-on: ubuntu-latest  # 使用 x86_64 Linux 环境

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Docker Buildx（用于构建多平台镜像）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 登录阿里云容器镜像服务
      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}

      # 4. 构建并推送镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          # 使用 GitHub Actions 缓存加速构建
          cache-from: type=gha
          cache-to: type=gha,mode=max